<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Don't cache the HTML itself, so updated ?v= script versions are always picked up
     (the dev server sends no cache headers; without this the browser serves a stale page). -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<title>Pathfinder 1e Character Vault — free online PF1e character creator & manager</title>
<meta name="description" content="A free, offline-capable Pathfinder 1st Edition character creator and manager. Build and play characters with every published class, feat, spell, race and item — point buy, leveling, spellcasting, companions, an in-session play tracker, printable sheets and PDF export.">
<meta name="keywords" content="Pathfinder 1e, Pathfinder First Edition, character creator, character sheet, character builder, PF1e, tabletop RPG, character manager, spellbook, feats, free">
<meta name="robots" content="index, follow">

<link rel="canonical" href="https://pf1echaractervault.zancar615.workers.dev/">

<!-- TODO: paste the verification tag Google Search Console / Bing gives you here, e.g.
<meta name="google-site-verification" content="..."> -->


<!-- Link-preview cards (Google, Discord, social) -->
<meta property="og:type" content="website">
<meta property="og:title" content="Pathfinder 1e Character Vault">
<meta property="og:description" content="Free Pathfinder 1st Edition character creator & manager — every published class, feat, spell, race and item, with an in-session play tracker and printable/PDF sheets.">
<meta property="og:url" content="https://pf1echaractervault.zancar615.workers.dev/">
<meta property="og:site_name" content="Pathfinder 1e Character Vault">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Pathfinder 1e Character Vault">
<meta name="twitter:description" content="Free Pathfinder 1st Edition character creator & manager — full rules database, play tracker, printable & PDF sheets.">

<meta name="theme-color" content="#1a1612">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">

<!-- Two cache-busting versions: APP_VERSION covers css/, js/ and vendor/;
     DATA_VERSION covers the ~17 MB of compiled data/*.js, which rarely changes.
     Bump APP_VERSION after any css/js change; bump DATA_VERSION only after
     rebuilding data/ (a routine app release then re-downloads ~100 KB, not the
     whole dataset). The service worker keys its two caches on the same pair. -->
<script>var APP_VERSION = 83; var DATA_VERSION = 6;
document.write('<link rel="stylesheet" href="css/styles.css?v=' + APP_VERSION + '">');</script>
<noscript><link rel="stylesheet" href="css/styles.css"></noscript>
</head>
<body>
<div id="app">
  <div class="boot">
    <h1>Pathfinder 1e Character Vault</h1>
    <p>A free, offline-capable character creator and manager for the Pathfinder Roleplaying Game
    (1st Edition). Build and play characters with every published class, feat, spell, race and
    item, then print or export a sheet.</p>
    <p>Loading rules data&hellip;</p>
    <noscript><p><strong>This app needs JavaScript enabled.</strong> All character data stays in
    your own browser — nothing is uploaded.</p></noscript>
  </div>
</div>

<div id="modal-root"></div>

<!-- Compiled PRD data (Paizo OGL content via PSRD-Data), then the app modules.
     document.write keeps the tags parser-blocking, so load order is preserved;
     data/ files get DATA_VERSION, everything else APP_VERSION (see <head>). -->
<script>
[
  'data/skills.js', 'data/races.js', 'data/racialtraits.js', 'data/classes.js',
  'data/archetypes.js', 'data/classabilities.js', 'data/mythicabilities.js',
  'data/mythicpaths.js', 'data/mythicspells.js', 'data/feats.js', 'data/spells.js',
  'data/weapons.js', 'data/armors.js', 'data/items.js', 'data/traits.js',
  'data/companions.js', 'data/evolutions.js', 'data/buffs.js', 'data/bundles.js',
  'vendor/jspdf.umd.min.js',
  'js/engine.js', 'js/library.js', 'js/custom.js', 'js/pdf.js', 'js/sheet.js',
  'js/generator.js', 'js/app.js',
].forEach(function (src) {
  var v = src.indexOf('data/') === 0 ? DATA_VERSION : APP_VERSION;
  document.write('<script src="' + src + '?v=' + v + '"><\/script>');
});

// Offline support + installability: the service worker precaches the app and
// data (two caches, so an app update doesn't re-download the dataset).
if ('serviceWorker' in navigator && location.protocol !== 'file:') {
  window.addEventListener('load', function () {
    navigator.serviceWorker.register('sw.js?app=' + APP_VERSION + '&data=' + DATA_VERSION)
      .catch(function () { /* offline support is progressive — the app still runs */ });
  });
}
</script>
</body>
</html>
